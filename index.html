<!DOCTYPE HTML>
<!--
	Language Redirect Page
	Automatically detects user language preference and redirects to appropriate version
-->
<html lang="en">

<head>
	<title>Qingguang Zheng - 郑庆广 | Computational Psychology Researcher</title>
	<meta charset="utf-8" />
	<meta name="description" content="Qingguang Zheng - Computational Psychology Researcher at Beijing Normal University. Redirecting to your preferred language version." />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	
	<!-- Language alternatives -->
	<link rel="alternate" hreflang="en" href="/en/" />
	<link rel="alternate" hreflang="zh" href="/zh/" />
	<link rel="alternate" hreflang="x-default" href="/en/" />
	
	<!-- Minimal styling for redirect page -->
	<style>
		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			margin: 0;
			padding: 0;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: white;
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
			text-align: center;
		}
		
		.redirect-container {
			max-width: 600px;
			padding: 2rem;
			background: rgba(255, 255, 255, 0.1);
			border-radius: 15px;
			backdrop-filter: blur(10px);
			box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
		}
		
		.logo {
			font-size: 2.5rem;
			font-weight: 700;
			margin-bottom: 1rem;
			background: linear-gradient(45deg, #fff, #f0f0f0);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
		}
		
		.subtitle {
			font-size: 1.1rem;
			margin-bottom: 2rem;
			opacity: 0.9;
		}
		
		.language-options {
			display: flex;
			gap: 1rem;
			justify-content: center;
			margin-top: 2rem;
		}
		
		.lang-btn {
			padding: 0.8rem 1.5rem;
			background: rgba(255, 255, 255, 0.2);
			border: 2px solid rgba(255, 255, 255, 0.3);
			border-radius: 8px;
			color: white;
			text-decoration: none;
			font-weight: 600;
			transition: all 0.3s ease;
			cursor: pointer;
		}
		
		.lang-btn:hover {
			background: rgba(255, 255, 255, 0.3);
			border-color: rgba(255, 255, 255, 0.5);
			transform: translateY(-2px);
		}
		
		.redirect-message {
			margin-top: 1.5rem;
			font-size: 0.9rem;
			opacity: 0.8;
		}
		
		.loading {
			display: inline-block;
			width: 20px;
			height: 20px;
			border: 2px solid rgba(255, 255, 255, 0.3);
			border-radius: 50%;
			border-top-color: white;
			animation: spin 1s ease-in-out infinite;
			margin-left: 0.5rem;
		}
		
		@keyframes spin {
			to { transform: rotate(360deg); }
		}
		
		@media (max-width: 600px) {
			.redirect-container {
				margin: 1rem;
				padding: 1.5rem;
			}
			
			.language-options {
				flex-direction: column;
				align-items: center;
			}
			
			.lang-btn {
				width: 200px;
			}
		}
	</style>
</head>

<body>
	<div class="redirect-container">
		<div class="logo">Qingguang Zheng<br>郑庆广</div>
		<div class="subtitle">Computational Psychology Researcher</div>
		
		<div class="language-options">
			<a href="/en/" class="lang-btn" onclick="setLanguagePreference('en')">
				🇺🇸 English
			</a>
			<a href="/zh/" class="lang-btn" onclick="setLanguagePreference('zh')">
				🇨🇳 中文
			</a>
		</div>
		
		<div class="redirect-message">
			<span id="redirect-text">Detecting your preferred language...</span>
			<span class="loading" id="loading-spinner"></span>
		</div>
	</div>

	<!-- Enhanced Language Detection and Redirect Script -->
	<script>
		(function() {
			'use strict';
			
			// Configuration
			const config = {
				supportedLanguages: ['en', 'zh'],
				defaultLanguage: 'en',
				cookieName: 'preferred_language',
				autoRedirectDelay: 2000, // 2 seconds
				enableAutoRedirect: true
			};
			
			// DOM elements
			const redirectText = document.getElementById('redirect-text');
			const loadingSpinner = document.getElementById('loading-spinner');
			
			/**
			 * Set language preference cookie
			 */
			function setLanguagePreference(lang) {
				if (config.supportedLanguages.includes(lang)) {
					setCookie(config.cookieName, lang, 365);
				}
			}
			
			/**
			 * Get cookie value
			 */
			function getCookie(name) {
				const nameEQ = name + "=";
				const ca = document.cookie.split(';');
				for (let i = 0; i < ca.length; i++) {
					let c = ca[i];
					while (c.charAt(0) === ' ') c = c.substring(1, c.length);
					if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
				}
				return null;
			}
			
			/**
			 * Set cookie
			 */
			function setCookie(name, value, days) {
				let expires = "";
				if (days) {
					const date = new Date();
					date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
					expires = "; expires=" + date.toUTCString();
				}
				document.cookie = name + "=" + (value || "") + expires + "; path=/";
			}
			
			/**
			 * Detect the best language for the user
			 */
			function detectLanguage() {
				// Priority: Cookie > Browser preference > Default
				
				// 1. Check cookie preference
				const cookieValue = getCookie(config.cookieName);
				if (cookieValue && config.supportedLanguages.includes(cookieValue)) {
					return cookieValue;
				}
				
				// 2. Check browser preference
				const browserLang = getBrowserLanguage();
				if (browserLang && config.supportedLanguages.includes(browserLang)) {
					return browserLang;
				}
				
				// 3. Use default language
				return config.defaultLanguage;
			}
			
			/**
			 * Get browser language preference
			 */
			function getBrowserLanguage() {
				const languages = [];
				
				// Modern browsers
				if (navigator.languages) {
					languages.push(...navigator.languages);
				}
				
				// Fallback for older browsers
				if (navigator.language) {
					languages.push(navigator.language);
				}
				
				if (navigator.userLanguage) {
					languages.push(navigator.userLanguage);
				}
				
				// Check each language preference
				for (const lang of languages) {
					const langCode = lang.toLowerCase().split('-')[0];
					if (config.supportedLanguages.includes(langCode)) {
						return langCode;
					}
				}
				
				return null;
			}
			
			/**
			 * Update redirect message
			 */
			function updateMessage(message, hideSpinner = false) {
				if (redirectText) {
					redirectText.textContent = message;
				}
				if (hideSpinner && loadingSpinner) {
					loadingSpinner.style.display = 'none';
				}
			}
			
			/**
			 * Perform the language redirect
			 */
			function performRedirect() {
				const detectedLang = detectLanguage();
				const targetUrl = `/${detectedLang}/`;
				
				updateMessage(`Redirecting to ${detectedLang === 'en' ? 'English' : 'Chinese'} version...`);
				
				// Perform redirect after a short delay
				setTimeout(() => {
					window.location.href = targetUrl;
				}, 500);
			}
			
			/**
			 * Initialize redirect logic
			 */
			function init() {
				// Check if we should perform auto-redirect
				if (config.enableAutoRedirect) {
					const detectedLang = detectLanguage();
					const langName = detectedLang === 'en' ? 'English' : 'Chinese';
					
					updateMessage(`Detected language: ${langName}. Redirecting in ${config.autoRedirectDelay / 1000} seconds...`);
					
					// Auto-redirect after delay
					setTimeout(performRedirect, config.autoRedirectDelay);
				} else {
					updateMessage('Please select your preferred language:', true);
				}
			}
			
			/**
			 * Make setLanguagePreference available globally for onclick handlers
			 */
			window.setLanguagePreference = setLanguagePreference;
			
			// Initialize when DOM is ready
			if (document.readyState === 'loading') {
				document.addEventListener('DOMContentLoaded', init);
			} else {
				init();
			}
			
		})();
	</script>
</body>

</html>
